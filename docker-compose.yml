services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    ports:
      - "8080:80"
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      APP_ENV: ${APP_ENV:-local}
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sse_chat
      MYSQL_USER: app
      MYSQL_PASSWORD: app_password
    volumes:
      - db_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mysql -u root -proot sse_chat -e 'SELECT 1 FROM sessions LIMIT 1' > /dev/null 2>&1"
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 10s

  playwright:
    build:
      context: .
      dockerfile: docker/playwright/Dockerfile
    working_dir: /e2e
    environment:
      CI: "true"
    volumes:
      - ./e2e:/e2e
      - /e2e/node_modules
    depends_on:
      - app
    profiles:
      - e2e

volumes:
  db_data:
